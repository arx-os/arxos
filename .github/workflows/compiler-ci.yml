# Authoritative CI for the Building compiler (default = tui + compiler spine).
# Product path: ingest → building.yaml → validate/query → IFC export + TUI.
#
# Optional rings (agent, web, blockchain) are not PR blockers.
# Hardware drivers and render3d LiDAR viz are out of tree for now.
#
# Other workflows (rust-ci, ci, quality) are optional / scheduled and must not
# block PRs with multi-OS matrices, --all-features, or hard coverage gates.

name: Compiler CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  spine:
    name: Compiler spine
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (compiler-core / default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (compiler-core)
        run: cargo build --verbose

      - name: Unit tests (lib)
        run: cargo test --lib --verbose

      - name: Compiler spine integration
        run: |
          cargo test --verbose \
            --test compiler_spine_test \
            --test ifc_compiler_path_test \
            --test ifc_native_tests \
            --test ifc_integration_test \
            --test lidar_tests \
            --test bidirectional_tests \
            --test vendor_ifc_test \
            --test buildingsmart_ifc_test \
            --test contribution_spine_test \
            --test cli_help_surface_test

      - name: Full compiler-core suite
        run: cargo test --verbose

      # L1 pilot loop (R9 regression guard). Does not close R5 field transfer.
      - name: L1 smoke (sample IFC)
        run: ./scripts/l1_smoke.sh

  # Optional: single-OS release binary sanity (not multi-platform matrix)
  release-check:
    name: Release binary
    runs-on: ubuntu-latest
    needs: spine
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release (compiler-core)
        run: cargo build --release --verbose
      - name: Smoke CLI
        run: |
          ./target/release/arx --help
          ./target/release/arx --version
      - name: L1 smoke (release binary)
        run: ARX_BIN=./target/release/arx ./scripts/l1_smoke.sh
