# Optional extended Rust checks (NOT the PR gate).
# Authoritative PR CI: compiler-ci.yml
#
# Softened: single OS, no hard coverage fail, manual/weekly only.

name: Rust Extended (optional)

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 06:00 UTC
    - cron: "0 6 * * 0"

env:
  CARGO_TERM_COLOR: always

jobs:
  extended:
    name: Extended suite (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test (default features)
        run: cargo test --verbose

      - name: Clippy (default features, allow warnings)
        run: cargo clippy --all-targets -- -W warnings
        continue-on-error: true

      # Coverage is informational only — do not fail the build on threshold.
      - name: Coverage (llvm-cov, soft)
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info || true
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: hashFiles('lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
