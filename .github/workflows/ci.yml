# Optional security / audit lane (NOT the compiler PR gate).
# Authoritative PR CI: compiler-ci.yml
#
# Softened: no multi-OS matrix, no --all-features clippy/test on PR,
# no hard coverage gate. Runs on schedule + manual dispatch.
# Security audit still available for main/develop pushes.

name: Security & Audit (optional)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Weekly Monday 07:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo-audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # Soft dependency hygiene (does not block merges)
  deps:
    name: Dependency tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree --duplicates
        run: cargo tree --duplicates || true
