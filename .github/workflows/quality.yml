# Optional quality / bench lane (NOT the compiler PR gate).
# Authoritative PR CI: compiler-ci.yml
#
# Softened: weekly + manual only; no PR blocking; no --all-features -D warnings.

name: Quality (optional)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Weekly Sunday

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Soft quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (default features, warnings allowed)
        run: cargo clippy --all-targets
        continue-on-error: true

      - name: Doc build (default features)
        run: cargo doc --no-deps --document-private-items
        continue-on-error: true

      - name: Duplicate deps (informational)
        run: cargo tree --duplicates || true

  benchmarks:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo bench
        run: cargo bench --no-fail-fast || true
